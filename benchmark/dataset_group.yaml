# --- Filter-based subgroups ---
# Each entry below is resolved at runtime by filtering the 'source' group.
# All specified filters must match (AND logic). Datasets with null for a
# filtered attribute are excluded.

in-the-wild:
  source: all
  filters:
    in_the_wild: true

no-perturbation:
  source: all
  filters:
    perturbation: false

perturbed:
  source: all
  filters:
    perturbation: true

english-only:
  source: all
  filters:
    language: en

multilingual:
  source: all
  filters:
    language: multilingual

accented:
  source: all
  filters:
    accent: true

vocal-sounds:
  source: all
  filters:
    vocal_sounds: true

expressive:
  source: all
  filters:
    expressivity: true

vocoder-based:
  source: all
  filters:
    vocoder: true

neural-codec-based:
  source: all
  filters:
    neural_codec: true

in-the-wild-no-perturbation:
  source: all
  filters:
    in_the_wild: true
    perturbation: false
