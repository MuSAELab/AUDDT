# Defines groups of datasets for evaluation.
#
# Dataset attributes:
#   in_the_wild  : true | false | null (null = not declared)
#   perturbation : true | false | null
#   language     : en | mandarin | japanese | en+mandarin | multilingual | null
#   accent       : true | false | null
#   vocal_sounds : true | false | null
#   expressivity : true | false | null
#   vocoder      : true | false | null  (generated/processed with a vocoder)
#   neural_codec : true | false | null  (generated/processed with a neural codec)
#
# Comment out any dataset you do not have locally.
#
# Subgroups can be defined in two ways:
#   1. Explicit list — same format as 'all' below.
#   2. Filter-based — a dict with 'source' (group name) and 'filters' (attribute
#      key/value pairs that must ALL match). Datasets where an attribute is null
#      are excluded from filtered groups.

ROOT: data/

all:
